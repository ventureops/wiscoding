name: 새로운 팁 제출
description: 바이브코딩·Claude 활용·프로젝트 운영 관련 팁을 공유합니다
title: "[팁] "
labels: ["tip", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## 새 팁을 공유해주셔서 감사합니다 🎉

        이 양식을 따라 작성하시면 운영자가 검토 후 정식 문서로 편입합니다.
        부족한 항목은 코멘트로 함께 다듬을 수 있으니 부담 없이 제출하세요.

        제출 전 [기여 가이드](../blob/main/CONTRIBUTING.md)를 한 번 훑어보시면 좋습니다.

  - type: input
    id: title
    attributes:
      label: 팁 제목
      description: 한 줄로 무엇에 관한 팁인지 알려주세요
      placeholder: 예) Claude Code 훅으로 커밋 직전 자동 포맷 적용하기
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 분류
      description: 가장 가까운 카테고리를 선택하세요
      options:
        - Claude Code (CLI, 훅, 슬래시 명령, MCP, 단축키)
        - 바이브코딩 (워크플로, 프롬프트 패턴, AI 협업)
        - 프로젝트 운영 (배포, 협업 규칙, 문서화)
        - 도구·통합 (외부 도구, 자동화 스크립트)
        - 템플릿 (재사용 가능한 프롬프트·문서·설정)
    validations:
      required: true

  - type: textarea
    id: situation
    attributes:
      label: 상황
      description: 어떤 문제·맥락에서 이 팁이 필요한가요?
      placeholder: |
        예) Claude Code로 작업하다가 커밋할 때마다 prettier를 수동으로 돌리는 게 번거로웠습니다.
            훅으로 자동화하면 좋겠다는 생각에 시도해봤습니다.
    validations:
      required: true

  - type: textarea
    id: method
    attributes:
      label: 방법
      description: 단계별로 따라할 수 있게 적어주세요. 명령어는 코드 블록으로 감싸주세요.
      placeholder: |
        1. `~/.claude/settings.json` 열기
        2. `hooks.PreToolUse`에 다음 항목 추가
           ```json
           ...
           ```
        3. 저장 후 Claude Code 재시작
      render: markdown
    validations:
      required: true

  - type: textarea
    id: caveats
    attributes:
      label: 주의사항
      description: 흔한 실수, 안 통하는 케이스, 함정이 있다면 적어주세요
      placeholder: |
        - Windows에서는 경로 구분자 때문에 동작 안 함
        - 프로젝트별 설정과 충돌할 수 있음
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 검증 환경
      description: 어떤 환경에서 동작을 확인했는지 적어주세요
      value: |
        - OS:
        - Claude Code 버전:
        - 그 외 도구·버전:
        - 마지막 확인일: 2026-
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: 출처·참고
      description: 참고한 외부 자료가 있다면 링크를 남겨주세요. 본인 경험만으로 작성했다면 "직접 경험"이라고 적어도 됩니다.
      placeholder: |
        - https://docs.anthropic.com/...
        - 직접 경험
    validations:
      required: true

  - type: checkboxes
    id: agreements
    attributes:
      label: 제출 전 확인
      description: 아래 세 항목을 모두 확인해주세요
      options:
        - label: 이 글에는 API 키, 토큰, 사내 코드, 실명 등 **민감정보가 포함되어 있지 않습니다**.
          required: true
        - label: 적은 내용대로 따라하면 동작함을 **직접 확인**했습니다.
          required: true
        - label: 이 글이 정식 문서로 편입될 경우 **CC BY 4.0** 라이선스로 공유되는 데 동의합니다.
          required: true
